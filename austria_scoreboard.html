<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Austrian Grand Prix — Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700;900&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a1f16;--bg2:#0f2a1e;--bg3:#142f22;
  --silver:#c9d2d6;--silver-light:#eef2f0;
  --red:#d7263d;--gold:#c8a84b;
  --muted:rgba(201,210,214,0.45);
  --border:rgba(201,210,214,0.12);
  --card:rgba(255,255,255,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);font-family:'Barlow Condensed',sans-serif;color:var(--silver);}

.checker{position:fixed;top:0;left:0;right:0;height:8px;z-index:100;background:repeating-linear-gradient(90deg,#fff 0,#fff 16px,#000 16px,#000 32px);opacity:0.8;}
.checker-b{position:fixed;bottom:0;left:0;right:0;height:8px;z-index:100;background:repeating-linear-gradient(90deg,#fff 0,#fff 16px,#000 16px,#000 32px);opacity:0.8;}

/* MOUNTAIN BG */
.mountain-bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.mountain-bg svg{position:absolute;bottom:0;width:100%;height:45%;}

/* HEADER */
.hdr{position:fixed;top:8px;left:0;right:0;z-index:50;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(10,31,22,0.96);border-bottom:1px solid var(--border);}
.hdr-left{display:flex;align-items:center;gap:12px;}
.hdr-event{font-family:'Bitter',serif;font-size:18px;font-weight:900;color:var(--silver-light);}
.hdr-circuit{font-size:13px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.hdr-right{display:flex;align-items:center;gap:14px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.day-badge{background:var(--red);color:#fff;font-size:12px;font-weight:700;letter-spacing:0.1em;padding:3px 12px;border-radius:12px;text-transform:uppercase;}
.last-update{font-size:11px;color:var(--muted);}

/* LAYOUT */
.board{position:relative;z-index:10;display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:64px 24px 24px;height:100vh;}
.col{display:flex;flex-direction:column;gap:14px;overflow:hidden;}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;gap:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.sec-label{font-family:'Bitter',serif;font-size:14px;font-weight:700;color:var(--silver-light);letter-spacing:0.04em;text-transform:uppercase;}
.sec-sub{font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-left:auto;}

/* CONSTRUCTOR TABLE */
.con-list{display:flex;flex-direction:column;gap:5px;}
.con-row{display:grid;grid-template-columns:28px 1fr 80px 55px;gap:8px;align-items:center;padding:8px 10px;border-radius:8px;background:var(--card);border:1px solid var(--border);transition:all 0.3s;}
.con-row.p1{border-color:var(--gold);background:rgba(200,168,75,0.08);}
.con-row.p2{border-color:var(--silver);background:rgba(201,210,214,0.05);}
.con-row.p3{border-color:#cd7f32;background:rgba(205,127,50,0.05);}
.con-pos{font-family:'Bitter',serif;font-size:16px;font-weight:900;color:var(--muted);text-align:center;}
.con-row.p1 .con-pos{color:var(--gold);}
.con-row.p2 .con-pos{color:var(--silver);}
.con-row.p3 .con-pos{color:#cd7f32;}
.con-name{font-family:'Bitter',serif;font-size:13px;font-weight:700;color:var(--silver-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.con-bar-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:4px;}
.con-bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}
.con-pts{font-family:'Bitter',serif;font-size:18px;font-weight:900;color:var(--silver-light);text-align:right;}
.con-delta{font-size:11px;color:var(--muted);text-align:right;}
.con-delta.up{color:#4ce88a;}

/* SPOTLIGHT */
.spotlight{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;transition:all 0.4s;position:relative;overflow:hidden;}
.spotlight.flash{border-color:var(--gold);background:rgba(200,168,75,0.08);}
.spotlight-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
.spotlight-driver{font-family:'Bitter',serif;font-size:22px;font-weight:900;color:var(--silver-light);}
.spotlight-meta{font-size:13px;color:var(--muted);margin-top:4px;}
.spotlight-cat{font-size:16px;color:var(--silver);margin-top:6px;font-weight:600;}
.spotlight-time{position:absolute;top:14px;right:16px;font-size:11px;color:var(--muted);}
.spotlight-empty{color:var(--muted);font-size:14px;font-style:italic;}
.pr-pill{background:var(--red);color:#fff;font-size:10px;font-weight:700;letter-spacing:0.08em;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle;}

/* DRIVER STANDINGS */
.bracket-tabs{display:flex;gap:8px;margin-bottom:10px;}
.btab{font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:4px 12px;border-radius:20px;border:1px solid var(--border);color:var(--muted);transition:all 0.3s;}
.btab.active{background:var(--red);border-color:var(--red);color:#fff;}
.pip-row{display:flex;gap:6px;align-items:center;margin-left:auto;}
.pip{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all 0.3s;}
.pip.active{background:var(--gold);}
.driver-table{flex:1;overflow-y:auto;}
.drv-row{display:grid;grid-template-columns:28px 1fr 55px;gap:8px;align-items:center;padding:7px 10px;border-radius:7px;margin-bottom:4px;background:var(--card);border:1px solid var(--border);}
.drv-row.p1{border-color:var(--gold);}
.drv-pos{font-family:'Bitter',serif;font-size:15px;font-weight:900;color:var(--muted);text-align:center;}
.drv-row.p1 .drv-pos{color:var(--gold);}
.drv-name{font-family:'Bitter',serif;font-size:14px;color:var(--silver-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.drv-team{font-size:11px;color:var(--muted);}
.drv-pts{font-family:'Bitter',serif;font-size:16px;font-weight:900;color:var(--silver-light);text-align:right;}
.bracket-hdr{font-family:'Bitter',serif;font-size:13px;font-weight:700;color:var(--silver);text-transform:uppercase;letter-spacing:0.08em;padding:8px 0 5px;border-top:1px solid var(--border);margin-top:6px;}
.bracket-hdr:first-child{border-top:none;margin-top:0;padding-top:0;}
.tdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* TICKER */
.ticker{position:fixed;bottom:8px;left:0;right:0;z-index:50;height:26px;overflow:hidden;background:rgba(10,31,22,0.92);border-top:1px solid var(--border);display:flex;align-items:center;}
.ticker-lbl{background:var(--red);color:#fff;font-size:11px;font-weight:700;letter-spacing:0.1em;padding:0 12px;height:100%;display:flex;align-items:center;flex-shrink:0;text-transform:uppercase;}
.ticker-track{overflow:hidden;flex:1;}
.ticker-inner{white-space:nowrap;font-size:12px;color:var(--muted);letter-spacing:0.06em;animation:scroll 40s linear infinite;}
@keyframes scroll{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}

/* OVERTAKE */
.overtake{position:fixed;top:64px;right:20px;z-index:150;background:var(--red);color:#fff;padding:8px 16px;border-radius:8px;font-family:'Bitter',serif;font-size:14px;font-weight:700;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.overtake.on{opacity:1;}
</style>
</head>
<body>
<div class="mountain-bg">
  <svg viewBox="0 0 1400 300" preserveAspectRatio="xMidYMax meet">
    <polygon points="0,300 180,100 360,300" fill="rgba(20,60,35,0.55)"/>
    <polygon points="150,300 350,60 550,300" fill="rgba(15,50,28,0.65)"/>
    <polygon points="400,300 600,40 800,300" fill="rgba(20,60,35,0.6)"/>
    <polygon points="600,300 800,90 1000,300" fill="rgba(15,45,25,0.65)"/>
    <polygon points="850,300 1050,50 1250,300" fill="rgba(20,60,35,0.55)"/>
    <polygon points="1100,300 1280,80 1400,300" fill="rgba(15,50,28,0.6)"/>
    <polygon points="0,300 250,180 500,300" fill="rgba(10,35,20,0.75)"/>
    <polygon points="400,300 650,160 900,300" fill="rgba(10,35,20,0.75)"/>
    <polygon points="750,300 1000,150 1250,300" fill="rgba(10,35,20,0.75)"/>
  </svg>
</div>
<div class="checker"></div>
<div class="checker-b"></div>

<div class="hdr">
  <div class="hdr-left">
    <div class="live-dot"></div>
    <div class="hdr-event">🇦🇹 Austrian Grand Prix</div>
    <div class="hdr-circuit">Red Bull Ring · Spielberg</div>
  </div>
  <div class="hdr-right">
    <span class="day-badge" id="day-badge">Day 1</span>
    <span class="last-update" id="last-update">Loading...</span>
  </div>
</div>

<div class="board">
  <div class="col">
    <div><div class="sec-head"><span class="sec-label">🏎️ Today's Race</span><span class="sec-sub" id="today-label">Day 1</span></div></div>
    <div class="con-list" id="con-list"></div>
    <div><div class="sec-head" style="margin-top:4px;"><span class="sec-label">⚡ Latest Submission</span></div></div>
    <div class="spotlight" id="spotlight">
      <div class="spotlight-time" id="spotlight-time"></div>
      <div class="spotlight-lbl">Most Recent Entry</div>
      <div class="spotlight-empty" id="spotlight-empty">Waiting for first entry...</div>
      <div id="spotlight-content" style="display:none;">
        <div class="spotlight-driver" id="spotlight-driver"></div>
        <div class="spotlight-meta" id="spotlight-meta"></div>
        <div class="spotlight-cat" id="spotlight-cat"></div>
      </div>
    </div>
  </div>

  <div class="col">
    <div>
      <div class="sec-head">
        <span class="sec-label">🏆 Season Championship</span>
        <div class="pip-row">
          <div class="pip active" id="pip-0"></div>
          <div class="pip" id="pip-1"></div>
          <div class="pip" id="pip-2"></div>
        </div>
      </div>
    </div>
    <div class="bracket-tabs">
      <div class="btab active" id="btab-0">Product Zone</div>
      <div class="btab" id="btab-1">Genius Bar</div>
      <div class="btab" id="btab-2">Forum + Ops</div>
    </div>
    <div class="driver-table" id="driver-table"></div>
  </div>
</div>

<div class="ticker"><div class="ticker-lbl">Live</div><div class="ticker-track"><div class="ticker-inner" id="ticker-inner">Austrian Grand Prix · Red Bull Ring · Spielberg · Championship in progress 🇦🇹</div></div></div>
<div class="overtake" id="overtake"></div>

<script>
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbxoFKqfKifXlryGg99H4hwRDPaw0yBMWjGNuNjX3tYcvoxrkz6Y6N7QNud1A4OJmAqY/exec';
var REFRESH_MS = 10000;
var BRACKET_ROTATE_MS = 8000;

var TEAM_COLORS = {
  'Ferrari':'#DC0000','McLaren':'#FF8000','Red Bull':'#1E5BC6',
  'Mercedes':'#00D2BE','Aston Martin':'#229971','Alpine':'#0078FF',
  'Williams':'#1868DB','Racing Bulls':'#2647D8','Haas':'#B0B3B8','Cadillac':'#1A1A1A'
};

var DAY_LABELS = ['Practice & Qualifying','Race Day 1','Race Day 2','Race Day 3','Austrian GP Final'];

var liveData = {
  constructors: [
    {name:'Ferrari',pts:0},{name:'McLaren',pts:0},{name:'Red Bull',pts:0},
    {name:'Mercedes',pts:0},{name:'Aston Martin',pts:0},{name:'Alpine',pts:0},
    {name:'Williams',pts:0},{name:'Racing Bulls',pts:0},{name:'Haas',pts:0},{name:'Cadillac',pts:0}
  ],
  drivers: {PZ:[],GB:[],Forum:[],Ops:[]},
  day: 1,
  spotlight: null
};

var bracketView = 0;
var bracketTimer = null;
var prevOrder = [];
var spotlightEntry = null;
var spotlightTimer = null;

// ── FETCH ────────────────────────────────────────────────────
function fetchData() {
  fetch(SHEET_URL + '?action=getScoreboard&t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(fresh) {
      if (!fresh || !fresh.constructors) return;
      detectOvertakes(liveData.constructors, fresh.constructors);
      liveData = fresh;
      if (fresh.spotlight) showSpotlight(fresh.spotlight);
      renderAll();
      document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      // Update today label
      var todayEl = document.getElementById('today-label');
      if (todayEl) todayEl.textContent = 'Day ' + (fresh.day||1) + ' Raw Scores';
    })
    .catch(function(e) {
      console.warn('Fetch failed:', e);
    });
}

// ── RENDER ALL ───────────────────────────────────────────────
function renderAll() {
  renderConstructors();
  renderDrivers();
  buildTicker();
  var badge = document.getElementById('day-badge');
  badge.textContent = 'Day ' + liveData.day + (DAY_LABELS[liveData.day-1] ? ' — ' + DAY_LABELS[liveData.day-1] : '');
}

// ── CONSTRUCTORS ─────────────────────────────────────────────
function renderConstructors() {
  var list = document.getElementById('con-list');
  var sorted = (liveData.seasonConstructors || liveData.constructors).slice().sort(function(a,b){return b.pts-a.pts;});
  var maxPts = sorted[0] ? sorted[0].pts : 1;
  if (maxPts === 0) maxPts = 1;

  list.innerHTML = sorted.map(function(c, i) {
    var pos = i + 1;
    var cls = pos===1?'p1':pos===2?'p2':pos===3?'p3':'';
    var color = TEAM_COLORS[c.name] || '#888';
    var barW = Math.round((c.pts / maxPts) * 100);
    return '<div class="con-row ' + cls + '">' +
      '<div class="con-pos">' + pos + '</div>' +
      '<div>' +
        '<div class="con-name">' + c.name + '</div>' +
        '<div class="con-bar-wrap"><div class="con-bar-fill" style="width:' + barW + '%;background:' + color + '"></div></div>' +
      '</div>' +
      '<div><div class="con-pts">' + c.pts.toFixed(1).replace('.0','') + '</div></div>' +
      '<div><div class="con-delta ' + (c.delta?'up':'') + '">' + (c.delta||'') + '</div></div>' +
    '</div>';
  }).join('');
}

// ── DRIVERS ──────────────────────────────────────────────────
function renderDrivers() {
  ['btab-0','btab-1','btab-2'].forEach(function(id,i) {
    var el = document.getElementById(id);
    el.classList.toggle('active', i === bracketView);
    document.getElementById('pip-'+i).classList.toggle('active', i === bracketView);
  });

  var table = document.getElementById('driver-table');
  // Right column shows season drivers
  var driverSource = liveData.seasonDrivers || liveData.drivers;
  var brackets = bracketView === 0
    ? [{label:'Product Zone',key:'PZ'}]
    : bracketView === 1
    ? [{label:'Genius Bar',key:'GB'}]
    : [{label:'Forum',key:'Forum'},{label:'Operations',key:'Ops'}];

  table.innerHTML = brackets.map(function(b) {
    var drivers = (driverSource[b.key] || []).slice(0,10);
    if (!drivers.length) {
      return '<div class="bracket-hdr">' + b.label + '</div>' +
        '<div style="color:var(--muted);font-size:13px;padding:8px 10px;">No entries yet</div>';
    }
    return '<div class="bracket-hdr">' + b.label + '</div>' +
      drivers.map(function(d,i) {
        var color = TEAM_COLORS[d.constructor] || '#888';
        return '<div class="drv-row ' + (i===0?'p1':'') + '">' +
          '<div class="drv-pos">' + (i+1) + '</div>' +
          '<div style="min-width:0;">' +
            '<div style="display:flex;align-items:center;gap:6px;">' +
              '<div class="tdot" style="background:' + color + '"></div>' +
              '<div class="drv-name">' + d.name + '</div>' +
            '</div>' +
            '<div class="drv-team">' + d.constructor + '</div>' +
          '</div>' +
          '<div class="drv-pts">' + (d.pts||0).toFixed(1).replace('.0','') + '</div>' +
        '</div>';
      }).join('');
  }).join('');
}

function rotateBracket() {
  bracketView = (bracketView + 1) % 3;
  renderDrivers();
}

// ── SPOTLIGHT ────────────────────────────────────────────────
function showSpotlight(entry) {
  if (!entry) return;
  spotlightEntry = entry;
  var box = document.getElementById('spotlight');
  document.getElementById('spotlight-empty').style.display = 'none';
  var content = document.getElementById('spotlight-content');
  content.style.display = 'block';
  document.getElementById('spotlight-driver').innerHTML = entry.driverName + (entry.isPR ? '<span class="pr-pill">PR</span>' : '');
  document.getElementById('spotlight-meta').textContent = (entry.constructor||'') + ' · ' + (entry.loggedBracket||'');
  document.getElementById('spotlight-cat').textContent = entry.qty + '× ' + entry.categoryName;
  box.classList.add('flash');
  setTimeout(function() { box.classList.remove('flash'); }, 800);
  updateSpotlightTime();
  clearInterval(spotlightTimer);
  spotlightTimer = setInterval(updateSpotlightTime, 30000);
}

function updateSpotlightTime() {
  if (!spotlightEntry) return;
  var diff = Math.floor((Date.now() - new Date(spotlightEntry.timestamp).getTime()) / 1000);
  var txt = diff < 5 ? 'just now' : diff < 60 ? diff + 's ago' : Math.floor(diff/60) + 'm ago';
  document.getElementById('spotlight-time').textContent = txt;
}

// ── OVERTAKE ─────────────────────────────────────────────────
function detectOvertakes(prev, next) {
  if (!prev.length || !next.length) return;
  var prevMap = {};
  prev.forEach(function(c,i) { prevMap[c.name] = i; });
  next.sort(function(a,b){return b.pts-a.pts;}).forEach(function(c,i) {
    if (prevMap[c.name] !== undefined && prevMap[c.name] > i) {
      var el = document.getElementById('overtake');
      el.textContent = '⬆️ ' + c.name + ' moves to P' + (i+1) + '!';
      el.classList.add('on');
      setTimeout(function() { el.classList.remove('on'); }, 4000);
    }
  });
}

// ── TICKER ───────────────────────────────────────────────────
function buildTicker() {
  var sorted = (liveData.seasonConstructors || liveData.constructors).slice().sort(function(a,b){return b.pts-a.pts;});
  var parts = sorted.slice(0,5).map(function(c,i) {
    return 'P'+(i+1)+': '+c.name+' '+(c.pts||0)+'pts';
  });
  parts.push('🇦🇹 Austrian Grand Prix · Red Bull Ring · Spielberg');
  document.getElementById('ticker-inner').textContent = parts.join('  ·  ');
}

// ── INIT ─────────────────────────────────────────────────────
renderAll();
fetchData();
setInterval(fetchData, REFRESH_MS);
bracketTimer = setInterval(rotateBracket, BRACKET_ROTATE_MS);
</script>
</body>
</html>
