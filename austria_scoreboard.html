<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Austrian Grand Prix — Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700;900&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a1f16;--bg2:#0f2a1e;--bg3:#142f22;
  --silver:#c9d2d6;--silver-light:#eef2f0;
  --red:#d7263d;--gold:#c8a84b;--bronze:#cd7f32;
  --muted:rgba(201,210,214,0.45);
  --border:rgba(201,210,214,0.14);
  --card:rgba(255,255,255,0.045);
  --green:#4ce88a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);font-family:'Barlow Condensed',sans-serif;color:var(--silver);}
@media (prefers-reduced-motion: reduce){*{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}}

.checker{position:fixed;top:0;left:0;right:0;height:10px;z-index:100;background:repeating-linear-gradient(90deg,#fff 0,#fff 18px,#000 18px,#000 36px);opacity:0.85;}
.checker-b{position:fixed;bottom:0;left:0;right:0;height:10px;z-index:100;background:repeating-linear-gradient(90deg,#fff 0,#fff 18px,#000 18px,#000 36px);opacity:0.85;}

.mountain-bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.mountain-bg svg{position:absolute;bottom:0;width:100%;height:48%;}

/* HEADER */
.hdr{position:fixed;top:10px;left:0;right:0;z-index:50;height:clamp(52px,6vh,76px);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,2.4vw,40px);background:rgba(10,31,22,0.97);border-bottom:1px solid var(--border);}
.hdr-left{display:flex;align-items:center;gap:clamp(10px,1.2vw,18px);}
.hdr-event{font-family:'Bitter',serif;font-size:clamp(18px,2.4vh,28px);font-weight:900;color:var(--silver-light);}
.hdr-circuit{font-size:clamp(12px,1.4vh,16px);color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.hdr-right{display:flex;align-items:center;gap:clamp(12px,1.6vw,20px);}
.live-dot{width:10px;height:10px;border-radius:50%;background:var(--red);animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.day-badge{background:var(--red);color:#fff;font-size:clamp(12px,1.4vh,16px);font-weight:700;letter-spacing:0.08em;padding:4px 14px;border-radius:14px;text-transform:uppercase;}
.last-update{font-size:clamp(11px,1.2vh,14px);color:var(--muted);}

/* STAGE — one full-screen scene at a time */
.stage{position:relative;z-index:10;height:100vh;padding:clamp(78px,9vh,106px) clamp(28px,3.2vw,56px) clamp(46px,5vh,62px);display:flex;flex-direction:column;}
.stage-inner{flex:1;display:flex;flex-direction:column;min-height:0;opacity:1;transition:opacity 0.5s ease;}
.stage-inner.fade{opacity:0;}

.scene-title{display:flex;align-items:baseline;gap:16px;margin-bottom:clamp(14px,2.2vh,30px);flex-shrink:0;}
.scene-label{font-family:'Bitter',serif;font-weight:900;font-size:clamp(26px,3.8vh,46px);color:var(--silver-light);text-transform:uppercase;letter-spacing:0.02em;}
.scene-sub{font-size:clamp(13px,1.6vh,19px);color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;margin-left:auto;}
.scene-dots{display:flex;gap:8px;align-items:center;}
.scene-dot{width:9px;height:9px;border-radius:50%;background:var(--border);}
.scene-dot.active{background:var(--gold);}

.row-list{display:flex;flex-direction:column;gap:clamp(8px,1.3vh,18px);flex:1;justify-content:flex-start;min-height:0;}
.row-list.tight{gap:clamp(4px,0.7vh,9px);}

/* CONSTRUCTOR HERO ROWS */
.hero-row{display:grid;grid-template-columns:clamp(46px,5.2vw,78px) 1fr clamp(100px,10vw,160px);align-items:center;gap:clamp(12px,1.6vw,24px);padding:clamp(6px,1vh,13px) clamp(16px,1.8vw,26px);border-radius:12px;background:var(--card);border:1.5px solid var(--border);flex:1;}
.hero-row.p1{border-color:var(--gold);background:rgba(200,168,75,0.10);}
.hero-row.p2{border-color:var(--silver);background:rgba(201,210,214,0.06);}
.hero-row.p3{border-color:var(--bronze);background:rgba(205,127,50,0.08);}
.hero-pos{font-family:'Bitter',serif;font-weight:900;font-size:clamp(22px,3.6vh,50px);color:var(--muted);text-align:center;}
.hero-row.p1 .hero-pos{color:var(--gold);}
.hero-row.p2 .hero-pos{color:var(--silver-light);}
.hero-row.p3 .hero-pos{color:var(--bronze);}
.hero-name-wrap{min-width:0;}
.hero-name{font-family:'Bitter',serif;font-weight:900;font-size:clamp(18px,3.1vh,38px);color:var(--silver-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hero-bar-wrap{height:clamp(3px,0.5vh,6px);background:var(--border);border-radius:4px;margin-top:clamp(4px,0.6vh,8px);}
.hero-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;}
.hero-pts{font-family:'Bitter',serif;font-weight:900;font-size:clamp(20px,3.4vh,44px);color:var(--silver-light);text-align:right;}
.hero-delta{font-size:clamp(10px,1.1vh,13px);color:var(--green);text-align:right;margin-top:2px;}

/* DRIVER HERO ROWS */
.drv-hero-row{display:grid;grid-template-columns:clamp(54px,5.6vw,88px) 1fr clamp(120px,12vw,190px);align-items:center;gap:clamp(14px,1.8vw,28px);padding:calc(clamp(9px,1.3vh,16px) * var(--scale,1)) clamp(18px,2vw,28px);border-radius:14px;background:var(--card);border:1.5px solid var(--border);flex:1;}
.drv-hero-row.p1{border-color:var(--gold);background:rgba(200,168,75,0.08);}
.drv-hero-pos{font-family:'Bitter',serif;font-weight:900;font-size:calc(clamp(26px,4.4vh,58px) * var(--scale,1));color:var(--muted);text-align:center;}
.drv-hero-row.p1 .drv-hero-pos{color:var(--gold);}
.drv-hero-name-row{display:flex;align-items:center;gap:clamp(8px,1vw,14px);min-width:0;}
.tdot-lg{width:calc(clamp(11px,1.5vh,18px) * var(--scale,1));height:calc(clamp(11px,1.5vh,18px) * var(--scale,1));border-radius:50%;flex-shrink:0;}
.drv-hero-name{font-family:'Bitter',serif;font-weight:900;font-size:calc(clamp(24px,4.2vh,58px) * var(--scale,1));color:var(--silver-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.drv-hero-team{font-size:calc(clamp(12px,1.5vh,19px) * var(--scale,1));color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
.drv-hero-pts{font-family:'Bitter',serif;font-weight:900;font-size:calc(clamp(28px,4.6vh,64px) * var(--scale,1));color:var(--silver-light);text-align:right;}

.dense-group{flex:1;display:flex;flex-direction:column;min-height:0;}
.dense-hdr{font-family:'Bitter',serif;font-size:clamp(14px,1.8vh,20px);font-weight:700;color:var(--silver);text-transform:uppercase;letter-spacing:0.08em;padding-bottom:6px;margin-bottom:6px;border-bottom:1px solid var(--border);flex-shrink:0;}
.empty-note{color:var(--muted);font-size:calc(clamp(14px,2vh,20px) * var(--scale,1));font-style:italic;padding:10px 4px;}

/* TICKER */
.ticker{position:fixed;bottom:10px;left:0;right:0;z-index:50;height:clamp(28px,3.4vh,38px);overflow:hidden;background:rgba(10,31,22,0.94);border-top:1px solid var(--border);display:flex;align-items:center;}
.ticker-lbl{background:var(--red);color:#fff;font-size:clamp(11px,1.3vh,14px);font-weight:700;letter-spacing:0.1em;padding:0 14px;height:100%;display:flex;align-items:center;flex-shrink:0;text-transform:uppercase;}
.ticker-track{overflow:hidden;flex:1;}
.ticker-inner{white-space:nowrap;font-size:clamp(13px,1.5vh,17px);color:var(--muted);letter-spacing:0.06em;animation:scroll 40s linear infinite;}
@keyframes scroll{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}

/* FULL-SCREEN INTERRUPTS */
.interrupt{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;background:#07140e;opacity:0;pointer-events:none;transition:opacity 0.4s ease;padding:40px;}
.interrupt.on{opacity:1;pointer-events:auto;}

.spot-eyebrow{font-size:clamp(14px,2vh,22px);letter-spacing:0.22em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:clamp(10px,2vh,24px);}
.spot-name{font-family:'Bitter',serif;font-weight:900;font-size:clamp(52px,10.5vh,140px);color:var(--silver-light);line-height:1.02;}
.spot-meta{font-size:clamp(17px,2.4vh,30px);color:var(--muted);margin-top:clamp(10px,1.6vh,20px);text-transform:uppercase;letter-spacing:0.08em;}
.spot-cat{font-family:'Bitter',serif;font-weight:700;font-size:clamp(26px,4.4vh,60px);color:var(--silver);margin-top:clamp(12px,2vh,24px);}
.spot-pr{display:inline-block;background:var(--red);color:#fff;font-size:clamp(13px,1.7vh,20px);font-weight:700;letter-spacing:0.1em;padding:6px 18px;border-radius:30px;margin-top:clamp(14px,2.2vh,26px);text-transform:uppercase;}

.pf-eyebrow{font-size:clamp(15px,2.2vh,24px);letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:clamp(8px,1.4vh,16px);}
.pf-pos{font-family:'Bitter',serif;font-weight:900;font-size:clamp(20px,3vh,30px);color:var(--silver);letter-spacing:0.05em;margin-bottom:clamp(18px,3vh,36px);}
.pf-cards{display:flex;align-items:center;justify-content:center;gap:clamp(20px,3.6vw,56px);}
.pf-card{display:flex;flex-direction:column;align-items:center;min-width:clamp(180px,22vw,320px);}
.pf-bar{width:clamp(60px,8vw,110px);height:8px;border-radius:6px;margin-bottom:clamp(14px,2vh,22px);}
.pf-name{font-family:'Bitter',serif;font-weight:900;font-size:clamp(28px,5.2vh,68px);color:var(--silver-light);line-height:1.05;}
.pf-pts{font-family:'Bitter',serif;font-weight:900;font-size:clamp(22px,3.8vh,46px);color:var(--muted);margin-top:6px;}
.pf-card.winner .pf-pts{color:var(--gold);}
.pf-card.loser{opacity:0.6;}
.pf-vs{font-family:'Bitter',serif;font-weight:900;font-size:clamp(22px,3.4vh,40px);color:var(--red);padding:0 6px;}
.pf-margin{font-size:clamp(14px,1.8vh,20px);color:var(--muted);margin-top:clamp(20px,3vh,34px);text-transform:uppercase;letter-spacing:0.1em;}
</style>
</head>
<body>
<div class="mountain-bg">
  <svg viewBox="0 0 1400 300" preserveAspectRatio="xMidYMax meet">
    <polygon points="0,300 180,100 360,300" fill="rgba(20,60,35,0.55)"/>
    <polygon points="150,300 350,60 550,300" fill="rgba(15,50,28,0.65)"/>
    <polygon points="400,300 600,40 800,300" fill="rgba(20,60,35,0.6)"/>
    <polygon points="600,300 800,90 1000,300" fill="rgba(15,45,25,0.65)"/>
    <polygon points="850,300 1050,50 1250,300" fill="rgba(20,60,35,0.55)"/>
    <polygon points="1100,300 1280,80 1400,300" fill="rgba(15,50,28,0.6)"/>
    <polygon points="0,300 250,180 500,300" fill="rgba(10,35,20,0.75)"/>
    <polygon points="400,300 650,160 900,300" fill="rgba(10,35,20,0.75)"/>
    <polygon points="750,300 1000,150 1250,300" fill="rgba(10,35,20,0.75)"/>
  </svg>
</div>
<div class="checker"></div>
<div class="checker-b"></div>

<div class="hdr">
  <div class="hdr-left">
    <div class="live-dot"></div>
    <div class="hdr-event">🇦🇹 Austrian Grand Prix</div>
    <div class="hdr-circuit">Red Bull Ring · Spielberg</div>
  </div>
  <div class="hdr-right">
    <span class="day-badge" id="day-badge">Day 1</span>
    <span class="last-update" id="last-update">Loading...</span>
  </div>
</div>

<div class="stage">
  <div class="stage-inner" id="stage-inner">
    <div class="scene-title">
      <span class="scene-label" id="scene-label">Season Championship</span>
      <span class="scene-sub" id="scene-sub"></span>
      <div class="scene-dots" id="scene-dots"></div>
    </div>
    <div class="row-list" id="row-list"></div>
  </div>
</div>

<div class="ticker"><div class="ticker-lbl">Live</div><div class="ticker-track"><div class="ticker-inner" id="ticker-inner">Austrian Grand Prix · Red Bull Ring · Spielberg · Championship in progress 🇦🇹</div></div></div>

<!-- LATEST ENTRY INTERRUPT -->
<div class="interrupt" id="spot-interrupt">
  <div class="spot-eyebrow">⚡ Latest Entry</div>
  <div class="spot-name" id="spot-name"></div>
  <div class="spot-meta" id="spot-meta"></div>
  <div class="spot-cat" id="spot-cat"></div>
  <div class="spot-pr" id="spot-pr" style="display:none;"></div>
</div>

<!-- PHOTO FINISH INTERRUPT -->
<div class="interrupt" id="pf-interrupt">
  <div class="pf-eyebrow" id="pf-eyebrow">📸 Photo Finish</div>
  <div class="pf-pos" id="pf-pos"></div>
  <div class="pf-cards">
    <div class="pf-card winner">
      <div class="pf-bar" id="pf-bar-winner"></div>
      <div class="pf-name" id="pf-name-winner"></div>
      <div class="pf-pts" id="pf-pts-winner"></div>
    </div>
    <div class="pf-vs">VS</div>
    <div class="pf-card loser">
      <div class="pf-bar" id="pf-bar-loser"></div>
      <div class="pf-name" id="pf-name-loser"></div>
      <div class="pf-pts" id="pf-pts-loser"></div>
    </div>
  </div>
  <div class="pf-margin" id="pf-margin"></div>
</div>

<script>
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbxoFKqfKifXlryGg99H4hwRDPaw0yBMWjGNuNjX3tYcvoxrkz6Y6N7QNud1A4OJmAqY/exec';
var REFRESH_MS = 10000;
var STAGE_ROTATE_MS = 5000;
var SPOTLIGHT_HOLD_MS = 5500;
var PHOTOFINISH_HOLD_MS = 5000;
var TOP_N = 6;
var CONSTRUCTOR_N = 10;

var TEAM_COLORS = {
  'Ferrari':'#DC0000','McLaren':'#FF8000','Red Bull':'#1E5BC6',
  'Mercedes':'#00D2BE','Aston Martin':'#229971','Alpine':'#0078FF',
  'Williams':'#1868DB','Racing Bulls':'#2647D8','Haas':'#B0B3B8','Cadillac':'#1A1A1A'
};

var DAY_LABELS = ['Practice & Qualifying','Race Day 1','Race Day 2','Race Day 3','Austrian GP Final'];

var liveData = {
  constructors: [
    {name:'Ferrari',pts:0},{name:'McLaren',pts:0},{name:'Red Bull',pts:0},
    {name:'Mercedes',pts:0},{name:'Aston Martin',pts:0},{name:'Alpine',pts:0},
    {name:'Williams',pts:0},{name:'Racing Bulls',pts:0},{name:'Haas',pts:0},{name:'Cadillac',pts:0}
  ],
  drivers: {PZ:[],GB:[],Forum:[],Ops:[]},
  day: 1,
  spotlight: null
};

var SCENES = [
  {label:'Season Championship', sub:'Constructors', type:'constructors'},
  {label:'Product Zone', sub:'Driver Standings', type:'drivers', key:'PZ'},
  {label:'Genius Bar', sub:'Driver Standings', type:'drivers', key:'GB'},
  {label:'Forum + Operations', sub:'Driver Standings', type:'dense', keys:[{key:'Forum',label:'Forum'},{key:'Ops',label:'Operations'}]}
];

var sceneIndex = 0;
var stageTimer = null;
var spotlightEntry = null;
var lastSpotlightTs = null;

var interruptActive = false;
var interruptQueue = [];

// ── FETCH ────────────────────────────────────────────────────
function fetchData() {
  fetch(SHEET_URL + '?action=getScoreboard&t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(fresh) {
      if (!fresh || !fresh.constructors) return;
      var prevConstructors = liveData.constructors;
      var prevSorted = (liveData.seasonConstructors || prevConstructors).slice().sort(function(a,b){return b.pts-a.pts;});
      var nextSorted = (fresh.seasonConstructors || fresh.constructors).slice().sort(function(a,b){return b.pts-a.pts;});
      detectOvertakes(prevSorted, nextSorted);

      liveData = fresh;

      if (fresh.spotlight && fresh.spotlight.timestamp !== lastSpotlightTs) {
        lastSpotlightTs = fresh.spotlight.timestamp;
        queueInterrupt(function() { showSpotlightInterrupt(fresh.spotlight); });
      }

      renderActiveScene();
      buildTicker();

      document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      var badge = document.getElementById('day-badge');
      badge.textContent = 'Day ' + liveData.day + (DAY_LABELS[liveData.day-1] ? ' — ' + DAY_LABELS[liveData.day-1] : '');
    })
    .catch(function(e) {
      console.warn('Fetch failed:', e);
    });
}

// ── STAGE ROTATION ──────────────────────────────────────────
function renderActiveScene() {
  var scene = SCENES[sceneIndex];
  document.getElementById('scene-label').textContent = scene.label;
  document.getElementById('scene-sub').textContent = scene.sub;
  renderDots();

  var list = document.getElementById('row-list');
  list.className = scene.type === 'constructors' ? 'row-list tight' : 'row-list';
  if (scene.type === 'constructors') {
    list.innerHTML = renderConstructorRows();
  } else if (scene.type === 'drivers') {
    list.innerHTML = renderDriverRows(scene.key);
  } else if (scene.type === 'dense') {
    list.style.setProperty('--scale', '0.62');
    list.innerHTML = scene.keys.map(function(g) {
      return '<div class="dense-group"><div class="dense-hdr">' + g.label + '</div><div class="row-list">' + renderDriverRows(g.key, 4) + '</div></div>';
    }).join('');
  }
  if (scene.type !== 'dense') list.style.removeProperty('--scale');
}

function renderDots() {
  var wrap = document.getElementById('scene-dots');
  wrap.innerHTML = SCENES.map(function(s, i) {
    return '<div class="scene-dot' + (i === sceneIndex ? ' active' : '') + '"></div>';
  }).join('');
}

function rotateStage() {
  if (interruptActive) return;
  var inner = document.getElementById('stage-inner');
  inner.classList.add('fade');
  setTimeout(function() {
    sceneIndex = (sceneIndex + 1) % SCENES.length;
    renderActiveScene();
    inner.classList.remove('fade');
  }, 450);
}

function restartStageTimer() {
  clearInterval(stageTimer);
  stageTimer = setInterval(rotateStage, STAGE_ROTATE_MS);
}

// ── CONSTRUCTOR ROWS ─────────────────────────────────────────
function renderConstructorRows() {
  var sorted = (liveData.seasonConstructors || liveData.constructors).slice().sort(function(a,b){return b.pts-a.pts;}).slice(0, CONSTRUCTOR_N);
  var maxPts = sorted[0] ? sorted[0].pts : 1;
  if (maxPts === 0) maxPts = 1;

  return sorted.map(function(c, i) {
    var pos = i + 1;
    var cls = pos===1?'p1':pos===2?'p2':pos===3?'p3':'';
    var color = TEAM_COLORS[c.name] || '#888';
    var barW = Math.round((c.pts / maxPts) * 100);
    return '<div class="hero-row ' + cls + '">' +
      '<div class="hero-pos">' + pos + '</div>' +
      '<div class="hero-name-wrap">' +
        '<div class="hero-name">' + c.name + '</div>' +
        '<div class="hero-bar-wrap"><div class="hero-bar-fill" style="width:' + barW + '%;background:' + color + '"></div></div>' +
      '</div>' +
      '<div>' +
        '<div class="hero-pts">' + c.pts.toFixed(1).replace('.0','') + '</div>' +
        (c.delta ? '<div class="hero-delta">' + c.delta + '</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}

// ── DRIVER ROWS ──────────────────────────────────────────────
function renderDriverRows(key, count) {
  count = count || TOP_N;
  var driverSource = liveData.seasonDrivers || liveData.drivers;
  var drivers = (driverSource[key] || []).slice(0, count);
  if (!drivers.length) {
    return '<div class="empty-note">No entries yet</div>';
  }
  return drivers.map(function(d, i) {
    var color = TEAM_COLORS[d.constructor] || '#888';
    return '<div class="drv-hero-row ' + (i===0?'p1':'') + '">' +
      '<div class="drv-hero-pos">' + (i+1) + '</div>' +
      '<div class="drv-hero-name-row">' +
        '<div class="tdot-lg" style="background:' + color + '"></div>' +
        '<div style="min-width:0;">' +
          '<div class="drv-hero-name">' + d.name + '</div>' +
          '<div class="drv-hero-team">' + d.constructor + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="drv-hero-pts">' + (d.pts||0).toFixed(1).replace('.0','') + '</div>' +
    '</div>';
  }).join('');
}

// ── INTERRUPT QUEUE ──────────────────────────────────────────
function queueInterrupt(fn) {
  interruptQueue.push(fn);
  processQueue();
}

function processQueue() {
  if (interruptActive || !interruptQueue.length) return;
  interruptActive = true;
  clearInterval(stageTimer);
  var job = interruptQueue.shift();
  job();
}

function endInterrupt() {
  interruptActive = false;
  restartStageTimer();
  processQueue();
}

// ── SPOTLIGHT INTERRUPT ──────────────────────────────────────
function showSpotlightInterrupt(entry) {
  spotlightEntry = entry;
  document.getElementById('spot-name').innerHTML = entry.driverName;
  document.getElementById('spot-meta').textContent = (entry.constructor||'') + ' · ' + (entry.loggedBracket||'');
  document.getElementById('spot-cat').textContent = entry.qty + '× ' + entry.categoryName;
  var prPill = document.getElementById('spot-pr');
  if (entry.isPR) {
    var prevText = entry.prPrevRecord ? (' (prev ' + entry.prPrevRecord + ')') : ' (first time hitting threshold)';
    prPill.textContent = '🏆 New PR — ' + entry.prNewRecord + ' ' + (entry.prCategory || entry.categoryName) + prevText;
    prPill.style.display = 'inline-block';
  } else {
    prPill.style.display = 'none';
  }

  var box = document.getElementById('spot-interrupt');
  box.classList.add('on');
  setTimeout(function() {
    box.classList.remove('on');
    setTimeout(endInterrupt, 400);
  }, SPOTLIGHT_HOLD_MS);
}

// ── PHOTO FINISH INTERRUPT ───────────────────────────────────
function detectOvertakes(prevSorted, nextSorted) {
  if (!prevSorted.length || !nextSorted.length) return;
  var prevMap = {};
  prevSorted.forEach(function(c, i) { prevMap[c.name] = i; });
  var prevByIndex = {};
  prevSorted.forEach(function(c, i) { prevByIndex[i] = c.name; });

  for (var i = 0; i < Math.min(nextSorted.length, 5); i++) {
    var mover = nextSorted[i];
    if (prevMap[mover.name] !== undefined && prevMap[mover.name] > i) {
      var victimName = prevByIndex[i];
      if (victimName && victimName !== mover.name) {
        var victim = nextSorted.filter(function(c) { return c.name === victimName; })[0];
        if (victim) {
          queueInterrupt(function(pos, m, v) {
            return function() { showPhotoFinish(pos, m, v); };
          }(i + 1, mover, victim));
        }
      }
      break; // most significant overtake only per fetch cycle
    }
  }
}

function showPhotoFinish(pos, winner, loser) {
  var margin = Math.abs((winner.pts||0) - (loser.pts||0));
  var tight = margin <= 1;
  document.getElementById('pf-eyebrow').textContent = tight ? '📸 Photo Finish' : '🏁 Overtake!';
  document.getElementById('pf-pos').textContent = 'BATTLE FOR P' + pos;

  var wColor = TEAM_COLORS[winner.name] || '#888';
  var lColor = TEAM_COLORS[loser.name] || '#888';
  document.getElementById('pf-bar-winner').style.background = wColor;
  document.getElementById('pf-bar-loser').style.background = lColor;
  document.getElementById('pf-name-winner').textContent = winner.name;
  document.getElementById('pf-name-loser').textContent = loser.name;
  document.getElementById('pf-pts-winner').textContent = winner.pts.toFixed(1).replace('.0','') + ' pts';
  document.getElementById('pf-pts-loser').textContent = loser.pts.toFixed(1).replace('.0','') + ' pts';
  document.getElementById('pf-margin').textContent = 'Margin: ' + margin.toFixed(1).replace('.0','') + ' pts';

  var box = document.getElementById('pf-interrupt');
  box.classList.add('on');
  setTimeout(function() {
    box.classList.remove('on');
    setTimeout(endInterrupt, 400);
  }, PHOTOFINISH_HOLD_MS);
}

// ── TICKER ───────────────────────────────────────────────────
function buildTicker() {
  var sorted = (liveData.seasonConstructors || liveData.constructors).slice().sort(function(a,b){return b.pts-a.pts;});
  var parts = sorted.slice(0,5).map(function(c,i) {
    return 'P'+(i+1)+': '+c.name+' '+(c.pts||0)+'pts';
  });
  parts.push('🇦🇹 Austrian Grand Prix · Red Bull Ring · Spielberg');
  document.getElementById('ticker-inner').textContent = parts.join('  ·  ');
}

// ── INIT ─────────────────────────────────────────────────────
renderActiveScene();
fetchData();
setInterval(fetchData, REFRESH_MS);
restartStageTimer();
</script>
